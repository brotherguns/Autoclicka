name: Build UniversalAutoClicker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}-v2

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz" \
            -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $THEOS/sdks/
          rm sdk.tar.xz

      - name: Build
        run: make package FINALPACKAGE=1 STRIP=0

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: UniversalAutoClicker-deb
          path: packages/*.deb
          if-no-files-found: error
